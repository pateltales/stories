<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story — PatelTales</title>
  <meta name="description" content="A story from PatelTales.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Nav starts in frosted state — no dark hero on this page -->
  <nav class="nav scrolled" role="navigation" aria-label="Main">
    <a href="index.html" class="nav-back">All Stories</a>
    <a href="index.html" class="nav-brand">PatelTales</a>
  </nav>

  <!-- ── Loading ── -->
  <div id="loading" class="loading" role="status" aria-label="Loading story" style="padding:7rem 0">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ── Story ── -->
  <article id="story-container" class="story-page" style="display:none">

    <header class="story-header">
      <span class="story-label" id="story-label">PatelTales</span>
      <h1 class="story-title" id="story-title"></h1>
      <p class="story-date"   id="story-date"></p>
    </header>

    <img id="story-image" class="story-feature-image" alt="" style="display:none" loading="eager">

    <div class="story-content" id="story-content"></div>

    <div class="story-footer-ornament">· · ·</div>

  </article>

  <!-- ── 404 ── -->
  <div id="error-state" class="error-page" style="display:none" role="alert">
    <h1>404</h1>
    <p>This story seems to have wandered off.</p>
    <a href="index.html">Return to all stories</a>
  </div>

  <!-- ── Footer ── -->
  <footer class="footer">
    <p>PatelTales &mdash; All rights reserved</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/story.js"></script>

</body>
</html>
