<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories — PatelTales</title>
  <meta name="description" content="A personal collection of stories and moments by Manu Patel.">
  <meta property="og:title"       content="Stories — PatelTales">
  <meta property="og:description" content="A personal collection of stories and moments.">
  <meta property="og:type"        content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Navigation (transparent over dark hero, frosted on scroll) ── -->
  <nav class="nav" role="navigation" aria-label="Main">
    <a href="index.html" class="nav-brand">
      <img src="../pateltales_logo.png" class="nav-logo" alt="PatelTales">
    </a>
  </nav>

  <!-- ── Hero — DSC05422.jpg from pateltales.github.io ── -->
  <header class="hero" style="background-image: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.72) 100%), url('../DSC05422.jpg');">
    <div class="hero-content">
      <p class="hero-eyebrow">A Collection of Moments</p>
      <h1 class="hero-title">Stories</h1>
    </div>
  </header>

  <!-- ── Stories ── -->
  <main class="stories-section" id="main-content">

    <div id="loading" class="loading" role="status" aria-label="Loading stories">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="stories-container" style="display:none">
      <p class="section-label">Latest</p>
      <div id="featured-story"></div>

      <p class="section-label" id="more-label" style="display:none">More Stories</p>
      <div class="story-grid" id="story-grid"></div>
    </div>

    <div id="empty-state" class="empty-state" style="display:none">
      <p class="empty-state-title">No stories yet.</p>
      <p>The first story is waiting to be told.</p>
    </div>

    <div id="error-state" class="empty-state" style="display:none">
      <p class="empty-state-title">Something went wrong.</p>
      <p>Could not load stories. Please check back later.</p>
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer class="footer">
    <p>PatelTales &mdash; All rights reserved</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>

</body>
</html>
